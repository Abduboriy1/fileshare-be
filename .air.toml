root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/main.go"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", ".git", ".idea"]
  exclude_regex = ["_test\\.go"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
